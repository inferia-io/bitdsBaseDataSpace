name: Build and Publish Federated Catalog Image (Main)

on:
  push:
    branches:
    - "main"
    paths:
      - 'commons/src/**'
      - 'iam-identity/src/**'
      - 'consumers/consumer/src/**'
      - 'federated-catalog/**'
      - '.github/workflows/federated-catalog.yml'

concurrency:
  group: fc-main
  cancel-in-progress: true

env:
  FC_IMAGE_REPOSITORY: ghcr.io/${{ github.repository_owner }}/federated-catalog

jobs:
  # -----------------------------
  # 1. BUILD & PUSH FC DOCKER IMAGE
  # ------------------------------
  build-and-push-fc:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # -------- LOGIN GHCR --------
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -------- GRADLE BUILD --------
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build federated catalog JAR
        run: |
          ./gradlew :federated-catalog:clean :federated-catalog:build
          
      # ---------------------------------

      - name: Set dynamic tags for Federated Catalog
        id: vars
        run: |
          IMAGE_BASE_FC="${FC_IMAGE_REPOSITORY}"
          DATE=$(date +%Y%m%d)
          SHA_SHORT=$(echo "${GITHUB_SHA}" | cut -c1-7)

          # Tags for federated catalog image
          echo "FC_LATEST=${IMAGE_BASE_FC}:latest" >> $GITHUB_OUTPUT
          echo "FC_SHA=${IMAGE_BASE_FC}:${SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "FC_DATE=${IMAGE_BASE_FC}:${DATE}" >> $GITHUB_OUTPUT

      # -------- DOCKER BUILD & PUSH --------
      - name: Build Docker image for Federated Catalog
        run: |
          docker build \
            -t ${{ steps.vars.outputs.FC_LATEST }} \
            -t ${{ steps.vars.outputs.FC_SHA }} \
            -t ${{ steps.vars.outputs.FC_DATE }} \
            ./federated-catalog

      - name: Push Federated Catalog images
        run: |
          docker push ${{ steps.vars.outputs.FC_LATEST }}
          docker push ${{ steps.vars.outputs.FC_SHA }}
          docker push ${{ steps.vars.outputs.FC_DATE }}
      # ---------------------------------
  deploy-fc:
    runs-on: ubuntu-latest
    needs: build-and-push-fc

    permissions:
      contents: read

    env:
      FC_PORT: ${{ vars.FC_PORT }}
      FC_DEPLOY_USER: ${{ vars.FC_DEPLOY_USER }}
      GHCR_USER: ${{ secrets.GHCR_USER }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${FC_PORT}" -H "${{ secrets.FC_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload stack file
        run: |
          ssh -p "${FC_PORT}" -i ~/.ssh/deploy_key "${FC_DEPLOY_USER}@${{ secrets.FC_HOST }}" "mkdir -p /home/${FC_DEPLOY_USER}/deploy"
          scp -P "${FC_PORT}" -i ~/.ssh/deploy_key federated-catalog/docker-stack-catalog.yml "${FC_DEPLOY_USER}@${{ secrets.FC_HOST }}:/home/${FC_DEPLOY_USER}/deploy/docker-stack-catalog.yml"

      - name: Deploy backend FC
        run: |
          SHA_SHORT=$(echo "${GITHUB_SHA}" | cut -c1-7)

          printf '%s' "${GHCR_TOKEN}" | ssh -p "${FC_PORT}" -i ~/.ssh/deploy_key "${FC_DEPLOY_USER}@${{ secrets.FC_HOST }}" "
            docker login ghcr.io -u '${GHCR_USER}' --password-stdin &&
            export FC_IMAGE_TAG=${SHA_SHORT} &&
            export FC_IMAGE_REPOSITORY=${FC_IMAGE_REPOSITORY} &&

            docker pull ${FC_IMAGE_REPOSITORY}:${SHA_SHORT} &&
            docker stack deploy --with-registry-auth -c /home/${FC_DEPLOY_USER}/deploy/docker-stack-catalog.yml federated-catalog
          "
